rule_files:
  - planner-alert-rules.yml

evaluation_interval: 1m

tests:
  - interval: 1m
    input_series:
      - series: 'agent_planner_route_total{env="prod"}'
        values: '0+100x30'
      - series: 'agent_planner_fallback_total{env="prod"}'
        values: '0+2x30'
    alert_rule_test:
      - eval_time: 20m
        alertname: PlannerFallbackSpikeWarningProd
        exp_alerts: []
      - eval_time: 20m
        alertname: PlannerFallbackRatioCriticalProd
        exp_alerts: []

  - interval: 1m
    input_series:
      - series: 'agent_planner_route_total{env="prod"}'
        values: '0+10x30'
      - series: 'agent_planner_fallback_total{env="prod"}'
        values: '0+8x30'
    alert_rule_test:
      - eval_time: 20m
        alertname: PlannerFallbackRatioCriticalProd
        exp_alerts:
          - exp_labels:
              alertname: PlannerFallbackRatioCriticalProd
              service: agent-app
              module: planner
              severity: critical
              env: prod
            exp_annotations:
              summary: "[prod] Planner fallback 比例持续偏高"
              description: "5分钟窗口 fallback/route 比例为 0.8，超过阈值 0.30。"
              runbook: "docs/dev-ops/observability/planner-alert-runbook.md"
              dashboard: "TODO: replace-with-prod-dashboard-url"

  - interval: 1m
    input_series:
      - series: 'agent_planner_route_total{env="staging"}'
        values: '0+1x30'
      - series: 'agent_planner_fallback_total{env="staging"}'
        values: '0+11x30'
    alert_rule_test:
      - eval_time: 20m
        alertname: PlannerFallbackSpikeWarningStaging
        exp_alerts:
          - exp_labels:
              alertname: PlannerFallbackSpikeWarningStaging
              service: agent-app
              module: planner
              severity: warning
              env: staging
            exp_annotations:
              summary: "[staging] Planner fallback 绝对值升高"
              description: "5分钟窗口 fallback 增量为 55，超过阈值 10。"
              runbook: "docs/dev-ops/observability/planner-alert-runbook.md"
              dashboard: "TODO: replace-with-staging-dashboard-url"
