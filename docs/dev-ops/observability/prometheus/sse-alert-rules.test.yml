rule_files:
  - sse-alert-rules.yml

evaluation_interval: 1m

tests:
  - interval: 1m
    input_series:
      - series: 'agent_sse_push_attempt_total{env="prod"}'
        values: '0+100x30'
      - series: 'agent_sse_push_fail_total{env="prod"}'
        values: '0+1x30'
      - series: 'agent_sse_replay_batch_total{env="prod"}'
        values: '0+100x30'
      - series: 'agent_sse_replay_hit_total{env="prod"}'
        values: '0+95x30'
      - series: 'agent_sse_replay_duration_seconds_sum{env="prod"}'
        values: '0+30x30'
      - series: 'agent_sse_replay_duration_seconds_count{env="prod"}'
        values: '0+100x30'
    alert_rule_test:
      - eval_time: 20m
        alertname: SsePushFailRatioCriticalProd
        exp_alerts: []
      - eval_time: 20m
        alertname: SseReplayHitRatioLowCriticalProd
        exp_alerts: []
      - eval_time: 20m
        alertname: SseReplayAvgDurationHighCriticalProd
        exp_alerts: []

  - interval: 1m
    input_series:
      - series: 'agent_sse_push_attempt_total{env="prod"}'
        values: '0+100x30'
      - series: 'agent_sse_push_fail_total{env="prod"}'
        values: '0+6x30'
    alert_rule_test:
      - eval_time: 20m
        alertname: SsePushFailRatioCriticalProd
        exp_alerts:
          - exp_labels:
              alertname: SsePushFailRatioCriticalProd
              service: agent-app
              module: sse
              severity: critical
              env: prod
            exp_annotations:
              summary: "[prod] SSE 推送失败比例持续偏高"
              description: "5 分钟窗口 push_fail/push_attempt 比例为 0.06，超过阈值 0.02。"
              runbook: "docs/dev-ops/observability/sse-alert-runbook.md"
              dashboard: "TODO: replace-with-prod-dashboard-url"

  - interval: 1m
    input_series:
      - series: 'agent_sse_replay_batch_total{env="prod"}'
        values: '0+100x30'
      - series: 'agent_sse_replay_hit_total{env="prod"}'
        values: '0+5x30'
    alert_rule_test:
      - eval_time: 20m
        alertname: SseReplayHitRatioLowCriticalProd
        exp_alerts:
          - exp_labels:
              alertname: SseReplayHitRatioLowCriticalProd
              service: agent-app
              module: sse
              severity: critical
              env: prod
            exp_annotations:
              summary: "[prod] SSE 回放命中率持续偏低"
              description: "5 分钟窗口 replay hit/batch 比例为 0.05，低于阈值 0.10。"
              runbook: "docs/dev-ops/observability/sse-alert-runbook.md"
              dashboard: "TODO: replace-with-prod-dashboard-url"

  - interval: 1m
    input_series:
      - series: 'agent_sse_replay_duration_seconds_sum{env="prod"}'
        values: '0+240x30'
      - series: 'agent_sse_replay_duration_seconds_count{env="prod"}'
        values: '0+100x30'
    alert_rule_test:
      - eval_time: 20m
        alertname: SseReplayAvgDurationHighCriticalProd
        exp_alerts:
          - exp_labels:
              alertname: SseReplayAvgDurationHighCriticalProd
              service: agent-app
              module: sse
              severity: critical
              env: prod
            exp_annotations:
              summary: "[prod] SSE 回放耗时持续偏高"
              description: "5 分钟窗口 replay 平均耗时为 2.4 秒，超过阈值 1.20 秒。"
              runbook: "docs/dev-ops/observability/sse-alert-runbook.md"
              dashboard: "TODO: replace-with-prod-dashboard-url"

  - interval: 1m
    input_series:
      - series: 'agent_sse_push_attempt_total{env="staging"}'
        values: '0+100x30'
      - series: 'agent_sse_push_fail_total{env="staging"}'
        values: '0+7x30'
      - series: 'agent_sse_replay_batch_total{env="staging"}'
        values: '0+100x30'
      - series: 'agent_sse_replay_hit_total{env="staging"}'
        values: '0+10x30'
      - series: 'agent_sse_replay_duration_seconds_sum{env="staging"}'
        values: '0+200x30'
      - series: 'agent_sse_replay_duration_seconds_count{env="staging"}'
        values: '0+100x30'
    alert_rule_test:
      - eval_time: 25m
        alertname: SsePushFailRatioWarningStaging
        exp_alerts:
          - exp_labels:
              alertname: SsePushFailRatioWarningStaging
              service: agent-app
              module: sse
              severity: warning
              env: staging
            exp_annotations:
              summary: "[staging] SSE 推送失败比例升高"
              description: "5 分钟窗口 push_fail/push_attempt 比例为 0.07，超过阈值 0.05。"
              runbook: "docs/dev-ops/observability/sse-alert-runbook.md"
              dashboard: "TODO: replace-with-staging-dashboard-url"
      - eval_time: 25m
        alertname: SseReplayHitRatioLowWarningStaging
        exp_alerts:
          - exp_labels:
              alertname: SseReplayHitRatioLowWarningStaging
              service: agent-app
              module: sse
              severity: warning
              env: staging
            exp_annotations:
              summary: "[staging] SSE 回放命中率偏低"
              description: "5 分钟窗口 replay hit/batch 比例为 0.1，低于阈值 0.20。"
              runbook: "docs/dev-ops/observability/sse-alert-runbook.md"
              dashboard: "TODO: replace-with-staging-dashboard-url"
      - eval_time: 25m
        alertname: SseReplayAvgDurationHighWarningStaging
        exp_alerts:
          - exp_labels:
              alertname: SseReplayAvgDurationHighWarningStaging
              service: agent-app
              module: sse
              severity: warning
              env: staging
            exp_annotations:
              summary: "[staging] SSE 回放耗时偏高"
              description: "5 分钟窗口 replay 平均耗时为 2 秒，超过阈值 1.50 秒。"
              runbook: "docs/dev-ops/observability/sse-alert-runbook.md"
              dashboard: "TODO: replace-with-staging-dashboard-url"
