server:
  port: 8091

# 线程池配置
thread:
  pool:
    executor:
      config:
        core-pool-size: 20
        max-pool-size: 50
        keep-alive-time: 5000
        block-queue-size: 5000
        policy: CallerRunsPolicy

# 数据库配置
spring:
  application:
    name: agent-app
  datasource:
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:}
    url: jdbc:postgresql://${DB_HOST:127.0.0.1}:5432/${DB_NAME:agent_db}?useUnicode=true&characterEncoding=utf8&serverTimezone=UTC
    driver-class-name: org.postgresql.Driver
    type: com.zaxxer.hikari.HikariDataSource
  hikari:
    pool-name: Agent_HikariCP
    minimum-idle: 15
    idle-timeout: 180000
    maximum-pool-size: 25
    auto-commit: true
    max-lifetime: 1800000
    connection-timeout: 30000
    connection-test-query: SELECT 1

  # Spring AI 配置
  ai:
    openai:
      api-key: ${OPENAI_API_KEY:a94406f9-86d4-4927-bd4d-f3c7bea874da}
      base-url: ${OPENAI_BASE_URL:https://ark.cn-beijing.volces.com}
      chat:
        completions-path: ${OPENAI_CHAT_COMPLETIONS_PATH:/api/v3/chat/completions}

# MyBatis 配置
mybatis:
  mapper-locations: classpath:/mybatis/mapper/*.xml
  config-location: classpath:/mybatis/config/mybatis-config.xml

# 日志
logging:
  level:
    root: info
    com.getoffer: info
  config: classpath:logback-spring.xml

app:
  auth:
    local:
      # 生产环境建议显式覆盖本地登录账号
      username: ${APP_AUTH_LOCAL_USERNAME:admin}
      password: ${APP_AUTH_LOCAL_PASSWORD}
      display-name: ${APP_AUTH_LOCAL_DISPLAY_NAME:Operator}
    token:
      # 兼容旧配置：若未显式配置 jwt.access-ttl-minutes，则按该小时数换算 access token 过期时间
      ttl-hours: ${APP_AUTH_TOKEN_TTL_HOURS:24}
    jwt:
      # JWT 签发方
      issuer: ${APP_AUTH_JWT_ISSUER:agent-app}
      # Access Token 过期时间（分钟）；<=0 时回退 token.ttl-hours
      access-ttl-minutes: ${APP_AUTH_JWT_ACCESS_TTL_MINUTES:0}
      # HS256 签名密钥（生产环境必填）
      secret: ${APP_AUTH_JWT_SECRET}
  share:
    # 任务分享链接生成时使用的外部访问地址（建议配置为前端生产域名）
    base-url: ${APP_SHARE_BASE_URL:http://127.0.0.1:8091}
    # 令牌哈希盐（生产环境必填）
    token-salt: ${APP_SHARE_TOKEN_SALT}
    # 分享链接最大有效期（小时）
    max-ttl-hours: ${APP_SHARE_MAX_TTL_HOURS:168}
observability:
  alert-catalog:
    dashboard:
      # 生产环境建议显式配置 Grafana 看板地址，替换告警目录中的 TODO 占位符
      prod-base-url: ${OBS_ALERT_DASHBOARD_PROD_BASE_URL:}
      staging-base-url: ${OBS_ALERT_DASHBOARD_STAGING_BASE_URL:}
    link-check:
      # 生产环境默认关闭，待 dashboard/runbook 链接治理到位后可按需开启
      enabled: ${OBS_ALERT_LINK_CHECK_ENABLED:false}
  http-log:
    # 生产默认开启入口日志，支持通过 sample-rate 进行降载
    enabled: true
    sample-rate: 1.0
    log-request-body: false

release-control:
  chat-planning:
    # 生产默认放开，可通过环境变量做灰度降流或熔断
    enabled: ${RELEASE_CHAT_PLANNING_ENABLED:true}
    traffic-percent: ${RELEASE_CHAT_PLANNING_TRAFFIC_PERCENT:100}
    kill-switch: ${RELEASE_CHAT_PLANNING_KILL_SWITCH:false}
